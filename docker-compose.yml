version: "3.9"

services:
  # ── Frontend React ──
  frontend:
    build: ./frontend
    container_name: dxc-rfp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build: ./backend
    container_name: dxc-rfp-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - chromadb
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: dxc-rfp-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── ChromaDB (Vector Store pour RAG) ──
  chromadb:
    image: chromadb/chroma:latest
    container_name: dxc-rfp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ── Langfuse (Observabilité LLM) ──
  langfuse:
    image: langfuse/langfuse:2
    container_name: dxc-rfp-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://dxc_rfp:dxc_rfp_secret_2024@postgres:5432/dxc_rfp_db
      - NEXTAUTH_SECRET=langfuse-secret-change-me
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=langfuse-salt-change-me
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
